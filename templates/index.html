<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Chatbot </title>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script> 
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
       

    </head>
    <body>
        <aside id="sidebar">
        </aside>
        <section id="mainContent">
            <header id='mainHeader'>
                <h1>Chat window</h1>
            </header>
            <div id="chatSession">

            </div>
            <footer id="chatInput">
                <input type="text" id="userInput" placeholder="add your chat here...">
                <button onclick="sendMessage()">Send</button>
                
                <input type="file" id="fileInput">
                <button onclick="$('#fileInput').click()">Add file</button>
            </footer>

        </section>
        <script>
            function appendMessage(user, text) {
                if (user == 'AI') {
                    text = marked.parse(text);
                }
                let avatar = user === 'user' ? 'User' : 'Chatbot';
                let messageClass = user === 'user' ? 'user-message' : 'AI-message';
                $('#chatInput').append(`
                    <div class='message ${messageClass}'>
                        <span class='avatar'>${avatar}</span>
                        <div class='text'>${text}</div>
                    </div>
                `);
                $('#chatInput').scrollTop($('#chatInput')[0].scrollHeight);
            }

            function sendMessage(){
                let text = $('#userInput').val();
                $('#userInput').val('');
                if (text.trim() !== ''){
                    appendMessage('user', text);
                    $.post('/ask', {text: text}, function(data){
                        appendMessage('AI', data.response);
                    });
                }
            }

            $('#userInput').on('keypress', function(e){
                if(e.which == 13){
                    sendMessage();
                }
            })
        </script>
    </body>
</html>
