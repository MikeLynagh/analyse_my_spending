<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Chatbot </title>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script> 
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
       

        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <body>
        <aside id="sidebar">
        </aside>
        <section id="mainContent">
            <header id='mainHeader'>
                <h1>Chat window</h1>
            </header>
            <div id="chatSession">

            </div>
            <footer id="chatInput">
                <input type="text" id="userInput" placeholder="add your chat here...">
                <button onclick="sendMessage()">Send</button>
                
                <input type="file" id="fileInput" accept=".pdf">
                <button onclick="uploadFile()">Upload PDF</button>
            </footer>

        </section>
        <script>
            function appendMessage(user, text) {
                if (user == 'AI') {
                    text = marked.parse(text);
                }
                let avatar = user === 'user' ? 'User' : 'Chatbot';
                let messageClass = user === 'user' ? 'user-message' : 'AI-message';
                $('#chatInput').append(`
                    <div class='message ${messageClass}'>
                        <span class='avatar'>${avatar}</span>
                        <div class='text'>${text}</div>
                    </div>
                `);
                $('#chatInput').scrollTop($('#chatInput')[0].scrollHeight);
            }

            function sendMessage(){
                let text = $('#userInput').val();
                $('#userInput').val('');
                if (text.trim() !== ''){
                    appendMessage('user', text);
                    $.post('/ask', {text: text}, function(data){
                        appendMessage('AI', data.response);
                    });
                }
            }

            function uploadFile(){
                let fileInput = document.getElementById('fileInput');
                if (fileInput.files.length === 0) {
                    alert('Please select a PDF file');
                    return;
                }
                
                let formData = new FormData();
                formData.append('file', fileInput.files[0]);
                
                $.ajax({
                    url: '/upload_pdf',
                    type: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: function(data) {
                        appendMessage('AI', `**PDF Uploaded: ${data.filename}**\n\n${data.content}`);
                        fileInput.value = '';
                    },
                    error: function(error) {
                        appendMessage('AI', 'Error uploading PDF: ' + error.responseJSON.error);
                    }
                });
            }

            $('#userInput').on('keypress', function(e){
                if(e.which == 13){
                    sendMessage();
                }
            })
        </script>
    </body>
</html>
