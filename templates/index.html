<!DOCTYPE html>
<html lang="en">
<head>
    <title>Chat Bot</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: white;
            color: black;
        }
        #container {
            max-width: 900px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #header {
            background: black;
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid black;
        }
        #chatSection {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid black;
            background: white;
        }
        .message {
            margin: 10px 0;
            padding: 10px;
            border-left: 3px solid black;
            padding-left: 10px;
        }
        .user-msg {
            background: white;
            border-left-color: black;
        }
        .bot-msg {
            background: #f0f0f0;
            border-left-color: gray;
        }
        #inputSection {
            padding: 20px;
            border-top: 1px solid black;
            display: flex;
            gap: 10px;
            background: white;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid black;
            font-size: 14px;
        }
        button {
            padding: 10px 20px;
            background: black;
            color: white;
            border: 1px solid black;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: gray;
            color: white;
        }
        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="header">
            <h1>Chat Bot</h1>
        </div>
        <div id="chatSection"></div>
        <div id="inputSection">
            <input type="text" id="userInput" placeholder="Type message... (say 'remember' to save)">
            <button onclick="sendMessage()">Send</button>
            <input type="file" id="fileInput" accept=".pdf">
            <button onclick="document.getElementById('fileInput').click()">PDF</button>
        </div>
    </div>

    <script>
        function appendMessage(role, text) {
            const section = $('#chatSection');
            const msgClass = role === 'user' ? 'user-msg' : 'bot-msg';
            const prefix = role === 'user' ? 'You: ' : 'Bot: ';
            
            if (role === 'bot') {
                text = marked.parse(text);
            }
            
            const html = `<div class="message ${msgClass}">${prefix}${text}</div>`;
            section.append(html);
            section.scrollTop(section[0].scrollHeight);
        }

        function sendMessage() {
            const text = $('#userInput').val();
            $('#userInput').val('');
            
            if (text.trim() === '') return;
            
            appendMessage('user', text);
            
            $.post('/ask', { text: text }, function(data) {
                appendMessage('bot', data.response);
            }).fail(function(error) {
                const msg = error.responseJSON?.error || error.statusText || 'Error';
                appendMessage('bot', 'Error: ' + msg);
                console.error('API Error:', error);
            });
        }

        function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) {
                alert('Select a PDF file');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            
            $.ajax({
                url: '/upload_pdf',
                type: 'POST',
                data: formData,
                processData: false,
                contentType: false,
                success: function(data) {
                    appendMessage('bot', `PDF Uploaded: ${data.filename}\n\n${data.content}`);
                    fileInput.value = '';
                },
                error: function(error) {
                    const msg = error.responseJSON?.error || 'Upload failed';
                    appendMessage('bot', 'PDF Error: ' + msg);
                }
            });
        }

        $('#userInput').on('keypress', function(e) {
            if (e.which === 13) {
                sendMessage();
            }
        });

        $(document).on('change', '#fileInput', function() {
            uploadFile();
        });
    </script>
</body>
</html>
